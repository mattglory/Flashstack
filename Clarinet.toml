[project]
name = "flashstack"
description = "FlashStack - Trustless flash minting of sBTC against locked/stacked STX"
authors = ["Glory Matthew"]
telemetry = false
cache_dir = "./.cache"
requirements = [
  { contract_id = "SP3TGRVG7DKGFVRTTVGGS60S59R916FWB4DAB9STZ.stx-flash-receiver-trait" },
  { contract_id = "SPQC38PW542EQJ5M11CR25P7BS1CA6QT4TBXGB3M.stableswap-stx-ststx-v-1-2" },
  { contract_id = "SPQC38PW542EQJ5M11CR25P7BS1CA6QT4TBXGB3M.stx-ststx-lp-token-v-1-2" },
  { contract_id = "SP4SZE494VC2YC5JYG7AYFQ44F5Q4PYV7DVMDPBG.ststx-token" },
]
boot_contracts = []

[contracts.flashstack-core]
path = "contracts/flashstack-core.clar"
clarity_version = 2
epoch = 2.5

[contracts.sbtc-token]
path = "contracts/sbtc-token.clar"
clarity_version = 2
epoch = 2.5

[contracts.flash-receiver-trait]
path = "contracts/flash-receiver-trait.clar"
clarity_version = 2
epoch = 2.5

[contracts.example-arbitrage-receiver]
path = "contracts/example-arbitrage-receiver.clar"
clarity_version = 2
epoch = 2.5

[contracts.test-receiver]
path = "contracts/test-receiver.clar"
clarity_version = 2
epoch = 2.5

[contracts.dex-aggregator-receiver]
path = "contracts/dex-aggregator-receiver.clar"
clarity_version = 2
epoch = 2.5

[contracts.liquidation-receiver]
path = "contracts/liquidation-receiver.clar"
clarity_version = 2
epoch = 2.5

[contracts.collateral-swap-receiver]
path = "contracts/collateral-swap-receiver.clar"
clarity_version = 2
epoch = 2.5

[contracts.multidex-arbitrage-receiver]
path = "contracts/multidex-arbitrage-receiver.clar"
clarity_version = 2
epoch = 2.5

[contracts.yield-optimization-receiver]
path = "contracts/yield-optimization-receiver.clar"
clarity_version = 2
epoch = 2.5

[contracts.leverage-loop-receiver]
path = "contracts/leverage-loop-receiver.clar"
clarity_version = 2
epoch = 2.5

[repl.analysis]
passes = ["check_checker"]

[repl.analysis.check_checker]
strict = false
trusted_sender = false
trusted_caller = false
callee_filter = false

[contracts.flashstack-stx-core]
path = "contracts/flashstack-stx-core.clar"
clarity_version = 3
epoch = 3.0
depends_on = ["stx-flash-receiver-trait"]

[contracts.stx-test-receiver]
path = "contracts/stx-test-receiver.clar"
clarity_version = 3
epoch = 3.0
depends_on = ["stx-flash-receiver-trait", "flashstack-stx-core"]

[contracts.bitflow-arb-receiver]
path = "contracts/bitflow-arb-receiver.clar"
clarity_version = 3
epoch = 3.0
depends_on = ["stx-flash-receiver-trait", "flashstack-stx-core"]

[contracts.snp-flashstack-receiver]
path = "contracts/snp-flashstack-receiver.clar"
clarity_version = 2
epoch = 2.5
depends_on = ["flash-receiver-trait", "sbtc-token", "flashstack-core"]

[contracts.snp-flashstack-receiver-v3]
path = "contracts/snp-flashstack-receiver-v3.clar"
clarity_version = 2
epoch = 2.5
depends_on = ["flash-receiver-trait", "sbtc-token", "flashstack-core"]